<div class="min-h-screen bg-gray-100 flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-gradient-to-b from-indigo-900 to-indigo-800 text-white flex flex-col">
        <div class="p-6 border-b border-indigo-700">
            <h1 class="text-2xl font-bold flex items-center gap-3">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                </svg>
                {{ title() }}
            </h1>
        </div>

        <nav class="flex-1 py-4">
            @for (item of menuItems; track item.path) {
            <a [routerLink]="item.path" routerLinkActive="bg-indigo-700 border-l-4 border-white"
                class="flex items-center gap-3 px-6 py-3 text-indigo-100 hover:bg-indigo-700 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon" />
                </svg>
                {{ item.label }}
            </a>
            }
        </nav>

        <div class="p-4 border-t border-indigo-700 text-indigo-300 text-sm">
            <p>SmartCard Admin v1.0</p>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto">
        <router-outlet />
    </main>
</div>
